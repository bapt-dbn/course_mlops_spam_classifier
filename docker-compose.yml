services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlops-api
    command: ["serve"]
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5001
      CML_DB_HOST: postgres
      CML_DB_PORT: "5432"
      CML_DB_USER: postgres
      CML_DB_PASSWORD: password
      CML_DB_NAME: postgres
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    networks:
      - mlops-network

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.9.0
    container_name: mlops-mlflow
    ports:
      - "5001:5001"
    environment:
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio-secret
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: >
      bash -c "pip install --quiet psycopg2-binary boto3 &&
      mlflow server
      --host 0.0.0.0
      --port 5001
      --backend-store-uri postgresql://postgres:password@postgres:5432/mlflow
      --artifacts-destination s3://mlflow
      --allowed-hosts mlflow:5001,localhost:5001"
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - mlops-network

  postgres:
    image: postgres:18.2-alpine
    container_name: mlops-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mlops-network

  postgres-init:
    image: postgres:18.2-alpine
    container_name: mlops-postgres-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: password
    entrypoint: >
      /bin/sh -c "
      psql -h postgres -U postgres -c 'CREATE DATABASE mlflow;' || true;
      exit 0;
      "
    networks:
      - mlops-network

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: mlops-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio-secret
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mlops-network

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: mlops-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 minio minio-secret;
      mc mb --ignore-existing minio/mlflow;
      exit 0;
      "
    networks:
      - mlops-network

volumes:
  postgres-data:
  minio-data:

networks:
  mlops-network:
    driver: bridge
