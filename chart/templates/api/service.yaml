apiVersion: v1
kind: Service
metadata:
  name: {{ include "chart.fullname" . }}-api
  labels:
    {{ include "chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{ include "chart.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
